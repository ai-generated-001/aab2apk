version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8100:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      - temp_data:/tmp/aab2apk

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8101:3000"
    environment:
      - VITE_API_BASE_URL=
    depends_on:
      - backend

volumes:
  temp_data:
