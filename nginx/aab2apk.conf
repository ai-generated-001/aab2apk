server {
    listen 80;
    server_name aab.nullcs.com;

    # Increase maximum upload file size to 1GB to support large Android App Bundles (.aab)
    client_max_body_size 1G;

    # Frontend: Reverse proxy to the Vue 3 Vite dev server running on port 3000
    location / {
        proxy_pass http://127.0.0.1:8101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API: Reverse proxy to the FastAPI container running on port 8000
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering to allow immediate chunk streaming and accurate upload progress indicators
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Increase timeouts for long-running APK compilation processes
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }
}
